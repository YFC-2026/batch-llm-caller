<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM batch caller</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #5f6b7a;
      --line: #d8dee6;
      --accent: #1769aa;
      --accent-hover: #12578e;
      --danger: #9f2a2a;
      --success: #1d7a46;
      --shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(720px, calc(100% - 32px));
      margin: 48px auto;
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 28px;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    form {
      display: grid;
      gap: 22px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 650;
    }

    textarea,
    input[type="text"],
    input[type="file"] {
      width: 100%;
      font: inherit;
      color: var(--text);
    }

    textarea,
    input[type="text"] {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
      background: #fff;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input[type="file"] {
      padding: 12px;
      border: 1px dashed #aeb8c5;
      border-radius: 6px;
      background: #fbfcfd;
    }

    button {
      width: fit-content;
      border: 0;
      border-radius: 6px;
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      margin-top: 26px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
      color: var(--muted);
      min-height: 54px;
      white-space: pre-wrap;
    }

    .status.error {
      border-color: #e2b8b8;
      color: var(--danger);
      background: #fff7f7;
    }

    .status.done {
      border-color: #b7dcc8;
      color: var(--success);
      background: #f4fbf7;
    }

    .results {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }

    .results h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .result-list {
      display: grid;
      gap: 12px;
    }

    .result {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    .result-header {
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      background: #f9fafb;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .result-body {
      display: grid;
      gap: 0;
    }

    .result-row {
      display: grid;
      gap: 6px;
      padding: 12px;
    }

    .result-row + .result-row {
      border-top: 1px solid var(--line);
    }

    .result-label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .result-text {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .download {
      margin-top: 22px;
      display: none;
    }

    .download.visible {
      display: inline-block;
    }

    @media (max-width: 560px) {
      main {
        margin: 24px auto;
        padding: 22px;
      }

      h1 {
        font-size: 1.7rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>LLM batch caller</h1>

    <form id="batch-form">
      <div class="field">
        <label for="system-prompt">System prompt</label>
        <textarea id="system-prompt" placeholder="Paste the system prompt here"></textarea>
      </div>

      <div class="field">
        <label for="prompt-file">Prompt file</label>
        <input id="prompt-file" type="file" accept=".txt,.csv,text/plain,text/csv">
        <p class="hint">Use a .txt or .csv file with one prompt per line.</p>
      </div>

      <div class="field">
        <label for="api-url">API URL</label>
        <input id="api-url" type="text" value="http://localhost:1234/v1/chat/completions" autocomplete="off">
      </div>

      <div class="field">
        <label for="api-key">API Key</label>
        <input id="api-key" type="password" value="" autocomplete="off">
      </div>

      <div class="field">
        <label for="model-name">Model name</label>
        <input id="model-name" type="text" value="qwen3.5-0.8b" placeholder="qwen3.5-0.8b (LM Studio), gemini-2.5-flash (Google AI Studio), meta-llama/llama-3.3-70b-instruct:free (OpenRouter)" autocomplete="off">
      </div>

      <div class="actions">
        <button id="run-button" type="submit">Run</button>
      </div>
    </form>

    <section id="status" class="status" aria-live="polite">Choose a file, add a system prompt if needed, then run the batch.</section>

    <section class="results" aria-live="polite">
      <h2>Results</h2>
      <div id="result-list" class="result-list"></div>
    </section>

    <button id="download-button" class="download" type="button">Download CSV</button>
  </main>

  <script>
    const form = document.getElementById("batch-form");
    const systemPromptInput = document.getElementById("system-prompt");
    const fileInput = document.getElementById("prompt-file");
    const apiUrlInput = document.getElementById("api-url");
    const apiKeyInput = document.getElementById("api-key");
    const modelInput = document.getElementById("model-name");
    const runButton = document.getElementById("run-button");
    const statusArea = document.getElementById("status");
    const resultList = document.getElementById("result-list");
    const downloadButton = document.getElementById("download-button");

    let results = [];

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Could not read file."));
        reader.readAsText(file);
      });
    }

    function parsePrompts(text) {
      return text
        .replace(/^\uFEFF/, "")
        .split(/\r?\n/)
        .filter((line) => line.trim().length > 0);
    }

    function setStatus(message, state) {
      statusArea.textContent = message;
      statusArea.classList.toggle("error", state === "error");
      statusArea.classList.toggle("done", state === "done");
    }

    function addResultCard(rowNumber, input, response) {
      const card = document.createElement("article");
      card.className = "result";

      const header = document.createElement("div");
      header.className = "result-header";
      header.textContent = "Row " + rowNumber;

      const body = document.createElement("div");
      body.className = "result-body";

      const inputRow = document.createElement("div");
      inputRow.className = "result-row";

      const inputLabel = document.createElement("div");
      inputLabel.className = "result-label";
      inputLabel.textContent = "Input";

      const inputText = document.createElement("p");
      inputText.className = "result-text";
      inputText.textContent = input;

      const responseRow = document.createElement("div");
      responseRow.className = "result-row";

      const responseLabel = document.createElement("div");
      responseLabel.className = "result-label";
      responseLabel.textContent = "Response";

      const responseText = document.createElement("p");
      responseText.className = "result-text";
      responseText.textContent = response;

      inputRow.append(inputLabel, inputText);
      responseRow.append(responseLabel, responseText);
      body.append(inputRow, responseRow);
      card.append(header, body);
      resultList.append(card);
    }

    async function callModel(apiUrl, apiKey, model, systemPrompt, prompt) {
      const messages = [];
      const headers = {
        "Content-Type": "application/json"
      };

      if (apiKey.trim()) {
        headers.Authorization = "Bearer " + apiKey.trim();
      }

      if (systemPrompt.trim()) {
        messages.push({
          role: "system",
          content: systemPrompt
        });
      }

      messages.push({
        role: "user",
        content: prompt
      });

      const response = await fetch(apiUrl, {
        method: "POST",
        headers,
        body: JSON.stringify({
          model,
          messages
        })
      });

      const responseText = await response.text();
      let data;

      try {
        data = responseText ? JSON.parse(responseText) : {};
      } catch {
        data = null;
      }

      if (!response.ok) {
        const errorMessage = data && data.error && data.error.message
          ? data.error.message
          : responseText || response.statusText || "Request failed.";
        throw new Error("HTTP " + response.status + ": " + errorMessage);
      }

      if (data && data.choices && data.choices[0] && data.choices[0].message) {
        return data.choices[0].message.content || "";
      }

      return responseText || "";
    }

    function escapeCsvField(value) {
      const text = String(value == null ? "" : value);
      if (/[",\r\n]/.test(text)) {
        return '"' + text.replace(/"/g, '""') + '"';
      }
      return text;
    }

    function buildCsv(rows) {
      const header = ["row_number", "input", "response"];
      const lines = [
        header.map(escapeCsvField).join(",")
      ];

      for (const row of rows) {
        lines.push([
          row.row_number,
          row.input,
          row.response
        ].map(escapeCsvField).join(","));
      }

      return lines.join("\r\n");
    }

    function resetRun() {
      results = [];
      resultList.textContent = "";
      downloadButton.classList.remove("visible");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetRun();

      const file = fileInput.files[0];
      const apiUrl = apiUrlInput.value.trim();
      const apiKey = apiKeyInput.value;
      const model = modelInput.value.trim();
      const systemPrompt = systemPromptInput.value;

      if (!file) {
        setStatus("Choose a .txt or .csv file first.", "error");
        return;
      }

      if (!model) {
        setStatus("Enter a model name before running.", "error");
        return;
      }

      if (!apiUrl) {
        setStatus("Enter an API URL before running.", "error");
        return;
      }

      runButton.disabled = true;

      try {
        setStatus("Reading file...");
        const fileText = await readFileAsText(file);
        const prompts = parsePrompts(fileText);

        if (prompts.length === 0) {
          setStatus("The selected file does not contain any prompts.", "error");
          return;
        }

        for (let index = 0; index < prompts.length; index += 1) {
          const rowNumber = index + 1;
          const input = prompts[index];
          setStatus("Processing row " + rowNumber + " of " + prompts.length + "...");

          let responseText;

          try {
            responseText = await callModel(apiUrl, apiKey, model, systemPrompt, input);
          } catch (error) {
            responseText = "Error: " + (error && error.message ? error.message : String(error));
          }

          const row = {
            row_number: rowNumber,
            input,
            response: responseText
          };

          results.push(row);
          addResultCard(row.row_number, row.input, row.response);
          setStatus("Completed row " + rowNumber + " of " + prompts.length + ".");
        }

        downloadButton.classList.add("visible");
        setStatus("Done. Processed " + results.length + " row" + (results.length === 1 ? "" : "s") + ".", "done");
      } catch (error) {
        setStatus(error && error.message ? error.message : String(error), "error");
      } finally {
        runButton.disabled = false;
      }
    });

    downloadButton.addEventListener("click", () => {
      const csv = buildCsv(results);
      const blob = new Blob([csv], {
        type: "text/csv;charset=utf-8"
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "results.csv";
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
